<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="calculator-card">
            <div class="header">
                <h1>Age Calculator</h1>
                <p>Find out exactly how old you are!</p>
            </div>
            
            <form id="age-form">
                <div class="input-group">
                    <div class="input-field">
                        <label for="day">Day</label>
                        <input type="number" id="day" placeholder="DD" min="1" max="31" required>
                        <span class="error-msg" id="error-day"></span>
                    </div>
                    <div class="input-field">
                        <label for="month">Month</label>
                        <input type="number" id="month" placeholder="MM" min="1" max="12" required>
                        <span class="error-msg" id="error-month"></span>
                    </div>
                    <div class="input-field">
                        <label for="year">Year</label>
                        <input type="number" id="year" placeholder="YYYY" required>
                        <span class="error-msg" id="error-year"></span>
                    </div>
                </div>
                
                <div class="button-container">
                    <button type="submit" id="calculate-btn">
                        <span>Calculate Age</span>
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                        </svg>
                    </button>
                </div>
            </form>

            <div class="result-area" id="result-area">
                <div class="result-box">
                    <span class="number" id="result-years">--</span>
                    <span class="label">Years</span>
                </div>
                <div class="result-box">
                    <span class="number" id="result-months">--</span>
                    <span class="label">Months</span>
                </div>
                <div class="result-box">
                    <span class="number" id="result-days">--</span>
                    <span class="label">Days</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
